<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .nav-container {
            padding: 20px 10px;
        }
        .nav-container h3 {
            margin: 0 0 15px 0;
            padding: 10px;
            background-color: #0066cc;
            color: white;
            text-align: center;
            border-radius: 5px;
        }
        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .nav-menu li {
            margin-bottom: 5px;
        }
        .nav-menu a {
            display: block;
            padding: 12px 15px;
            background-color: white;
            color: #333;
            text-decoration: none;
            border-left: 4px solid #0066cc;
            transition: all 0.3s;
            font-weight: bold;
        }
        .nav-menu a:hover {
            background-color: #0066cc;
            color: white;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <h3>Departments</h3>
        <ul class="nav-menu">
            <li><a href="catalogue.html?dept=CSBS" target="content">CSBS</a></li>
            <li><a href="catalogue.html?dept=CSE" target="content">CSE</a></li>
            <li><a href="catalogue.html?dept=ECE" target="content">ECE</a></li>
            <li><a href="catalogue.html?dept=EEE" target="content">EEE</a></li>
            <li><a href="catalogue.html?dept=CIVIL" target="content">CIVIL</a></li>
        </ul>
    </div>
</body>
</html>
