<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Selectors</title>
  <style>
    h1 {
      color: blue;
    }

    p {
      font-size: 18px;
    }

    .highlight {
      color: green;
      font-weight: bold;
    }

    #special {
      color: white;
      background-color: red;
      padding: 10px;
    }

    div p {
      color: purple;
    }

    a:hover {
      color: orange;
    }

    input[type="text"] {
      border: 2px solid black;
      padding: 5px;
    }
  </style>
</head>
<body>
  <h1>CSS Selectors Example</h1>

  <p>This paragraph is styled using an element selector.</p>

  <p class="highlight">This paragraph is styled using a class selector.</p>

  <p id="special">This paragraph is styled using an ID selector.</p>

  <div>
    <p>This paragraph is styled using a descendant selector.</p>
  </div>

  <a href="#">Hover over this link</a><br /><br />

  <input type="text" placeholder="Attribute selector example" />
</body>
</html>
