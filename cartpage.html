<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Book Store</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fb;
}
.navbar-brand{
    font-weight:bold;
}
.card{
    border-radius:15px;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">WebSiteName</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#register">Registration</a></li>
<li class="nav-item"><a class="nav-link" href="#cart">Cart</a></li>
</ul>
</div>
</div>
</nav>

<div class="container my-5">

<!-- CART PAGE -->
<section id="cart">
<h3 class="mb-4">Cart Page</h3>

<div class="card p-4 shadow-sm">
<table class="table table-bordered text-center align-middle">
<thead class="table-dark">
<tr>
<th>Book</th>
<th>Price ($)</th>
<th>Quantity</th>
<th>Amount ($)</th>
</tr>
</thead>

<tbody id="cartBody">
<tr>
<td>Java 2 XML</td>
<td class="price">35</td>
<td><input type="number" class="form-control qty" value="2"></td>
<td class="amount">70</td>
</tr>

<tr>
<td>Bible</td>
<td class="price">40.5</td>
<td><input type="number" class="form-control qty" value="1"></td>
<td class="amount">40.5</td>
</tr>
</tbody>

<tfoot>
<tr class="table-secondary">
<th colspan="3">Total</th>
<th id="total">110.5</th>
</tr>
</tfoot>

</table>

<button class="btn btn-primary w-100" onclick="calculateTotal()">Update Total</button>

</div>
</section>

<hr class="my-5">

<!-- REGISTRATION PAGE -->
<section id="register">
<h3 class="mb-4">Registration Page</h3>

<div class="card p-4 shadow-sm">

<form>

<div class="row">
<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Password</label>
<input type="password" class="form-control">
</div>
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input type="text" class="form-control">
</div>
</div>

<div class="mb-3">
<label>Sex</label><br>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="sex">
<label class="form-check-label">Male</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="sex">
<label class="form-check-label">Female</label>
</div>
</div>

<div class="mb-3">
<label>Date of Birth</label>
<div class="row">
<div class="col"><select class="form-select"><option>Day</option></select></div>
<div class="col"><select class="form-select"><option>Month</option></select></div>
<div class="col"><select class="form-select"><option>Year</option></select></div>
</div>
</div>

<div class="mb-3">
<label>Languages Known</label><br>
<div class="form-check form-check-inline">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">English</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Telugu</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Hindi</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Tamil</label>
</div>
</div>

<div class="mb-3">
<label>Address</label>
<textarea class="form-control"></textarea>
</div>

<button class="btn btn-success w-100">Register</button>

</form>

</div>
</section>

</div>

<!-- JS -->
<script>
function calculateTotal(){
let rows = document.querySelectorAll("#cartBody tr");
let total = 0;

rows.forEach(row=>{
let price = parseFloat(row.querySelector(".price").innerText);
let qty = parseInt(row.querySelector(".qty").value);
let amount = price * qty;
row.querySelector(".amount").innerText = amount.toFixed(2);
total += amount;
});

document.getElementById("total").innerText = total.toFixed(2);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
