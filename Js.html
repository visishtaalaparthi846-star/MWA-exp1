<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arithmetic Operations</title>
</head>
<body>
  <h2>JavaScript Arithmetic Operations</h2>

  <label>First Number:</label>
  <input type="number" id="num1" /><br /><br />

  <label>Second Number:</label>
  <input type="number" id="num2" /><br /><br />

  <button onclick="calculate()">Calculate</button>

  <h3>Results:</h3>
  <p id="add"></p>
  <p id="sub"></p>
  <p id="mul"></p>
  <p id="div"></p>

  <script>
    function calculate() {
      var a = parseFloat(document.getElementById("num1").value);
      var b = parseFloat(document.getElementById("num2").value);

      document.getElementById("add").innerHTML = "Addition: " + (a + b);
      document.getElementById("sub").innerHTML = "Subtraction: " + (a - b);
      document.getElementById("mul").innerHTML = "Multiplication: " + (a * b);
      document.getElementById("div").innerHTML = "Division: " + (a / b);
    }
  </script>
</body>
</html>
