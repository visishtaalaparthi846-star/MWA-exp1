<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .header-container {
            background: linear-gradient(135deg, #0066cc 0%, #004d99 100%);
            padding: 10px 20px;
            color: white;
        }
        .tata-banner {
            background-color: #1e5a96;
            padding: 5px 20px;
            font-size: 12px;
            color: white;
            text-align: right;
        }
        .college-info {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .logo {
            width: 60px;
            height: 60px;
            margin-right: 15px;
            background-color: white;
            border-radius: 50%;
            padding: 5px;
        }
        .college-name {
            flex-grow: 1;
        }
        .college-name h1 {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
        }
        .college-name p {
            margin: 2px 0;
            font-size: 11px;
        }
        .navigation-menu {
            display: flex;
            gap: 20px;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 5px;
        }
        .navigation-menu a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: color 0.3s;
        }
        .navigation-menu a:hover {
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <div class="tata-banner">
        TATA CONSULTANCY SERVICES - Experience Certainty
    </div>
    <div class="header-container">
        <div class="college-info">
            <img src="logo.png" alt="College Logo" class="logo" onerror="this.style.display='none'">
            <div class="college-name">
                <h1>R.V.R.&J.C. COLLEGE OF ENGINEERING (Autonomous)</h1>
                <p>Chandramoulipuram::Chowdavaram::Guntur-522019</p>
            </div>
        </div>
        <div class="navigation-menu">
            <a href="index.html" target="_top">Home</a>
            <a href="login.html" target="content">Login</a>
            <a href="registration.html" target="content">Registration</a>
            <a href="catalogue.html" target="content">Catalogue</a>
            <a href="cart.html" target="content">Cart</a>
        </div>
    </div>
</body>
</html>
